# MBTA Source Configuration (Documentation)
# 
# This is a human-readable reference version of the field definitions.
# The executable version is in macros/configs/mbta.sql (Jinja dict).
# Used by macros in macros/builders/ (bronze.sql, silver.sql)
#
# Pattern Used: DELETE-INSERT (Desert)
#   Bronze: Deletes rows by key from bronze where key exists in staging, then inserts all staging rows
#   Silver: Deletes rows by key from silver where key exists in bronze, then inserts all bronze rows
#
# Data types are lowercase for readability. Macros will uppercase when needed for BigQuery.
# When updating fields, update BOTH files to keep them in sync.

version: 2

mbta_sources:
  alerts:
    staging_table: mbta_alerts
    unique_key: 
      - alert_id
      - route
      - stop
    fields:
      - raw: active_period_start
        alias: alert_start_date
        type: date
      - raw: active_period_end
        alias: alert_end_date
        type: date
      - raw: alert_id
        alias: alert_id
        type: string
      - raw: route
        alias: route_id
        type: string
      - raw: stop
        alias: stop_id
        type: string
      - raw: header
        alias: alert_header
        type: string
      - raw: description
        alias: alert_description
        type: string
      - raw: cause
        alias: alert_cause
        type: string
      - raw: effect
        alias: alert_effect
        type: string
      - raw: severity
        alias: alert_severity
        type: int64
      - raw: duration_certainty
        alias: alert_duration_certainty
        type: string
      - raw: created_at
        alias: alert_created_at
        type: date
      - raw: updated_at
        alias: alert_updated_at
        type: date
      - raw: ingestion_timestamp
        alias: ingestion_timestamp
        type: timestamp
      - raw: ingestion_source
        alias: ingestion_source
        type: string

  routes:
    staging_table: mbta_routes
    unique_key:
      - route_id
    fields:
      - raw: route_id
        alias: route_id
        type: string
      - raw: long_name
        alias: route_name
        type: string
      - raw: description
        alias: route_description
        type: string
      - raw: route_type
        alias: route_type
        type: string
      - raw: color
        alias: route_color
        type: string
      - raw: direction_destinations
        alias: route_destinations
        type: string
      - raw: ingestion_timestamp
        alias: ingestion_timestamp
        type: timestamp
      - raw: ingestion_source
        alias: ingestion_source
        type: string
